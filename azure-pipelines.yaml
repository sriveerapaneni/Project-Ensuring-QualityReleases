name: Azure Pipelines

variables:
  python.version: '3.12'
  azureServiceConnection: 'myServiceConnection' # Update with your Azure service connection name
  resourceGroup: 'myResourceGroup'
  location: 'East US'
  terraformVersion: '1.0.0'
  tfStateStorageAccount: 'svuniquetfstorage'
  subscriptionId: 'ae0c02e7-8b4b-4b32-ac32-179af329442d'
  # armClientId, armClientSecret, armTenantId must be set as secret variables in Azure DevOps Pipeline Library

stages:
#--------------------------------------------#
# PROVISION INFRASTRUCTURE
#--------------------------------------------#
- stage: ProvisionInfrastructure
  displayName: 'Provision Infrastructure'
  jobs:
  - job: ProvisionTerraform
    displayName: 'Terraform Apply'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Install Terraform
    - task: TerraformInstaller@0
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: $(terraformVersion)
    
    # Terraform Init
    - task: TerraformTaskV2@2
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        backendServiceArm: $(azureServiceConnection)
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(tfStateStorageAccount)'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'
    
    # Terraform Validate
    - task: TerraformTaskV2@2
      displayName: 'Terraform Validate'
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
    
    # Terraform Plan
    - task: TerraformTaskV2@2
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        environmentServiceNameAzureRM: $(azureServiceConnection)
    
    # Import existing Resource Group into state (safe to run if already imported)
    - task: Bash@3
      displayName: 'Import Existing Resource Group'
      inputs:
        targetType: 'inline'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        script: |
          terraform import \
            module.resource_group.azurerm_resource_group.test \
            /subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroup) || true
      env:
        ARM_CLIENT_ID: $(armClientId)
        ARM_CLIENT_SECRET: $(armClientSecret)
        ARM_TENANT_ID: $(armTenantId)
        ARM_SUBSCRIPTION_ID: $(subscriptionId)

    # Import existing App Service resources if they exist in Azure but NOT yet in Terraform state.
    # Uses serverFarms (camelCase) as required by the AzureRM provider.
    # Checks state first to avoid 'Resource already managed' error on repeat runs.
    - task: Bash@3
      displayName: 'Import Existing AppService into State'
      inputs:
        targetType: 'inline'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        script: |
          RG="$(resourceGroup)"
          SUB="$(subscriptionId)"
          APP_SUFFIX="sv707d01"
          PLAN_NAME="myApplication-AppService"
          APP_NAME="myApplication-AppService-${APP_SUFFIX}"

          # Import App Service Plan only if it exists in Azure AND is not already in state
          PLAN_EXISTS=$(az appservice plan show --name "$PLAN_NAME" --resource-group "$RG" --query "name" -o tsv 2>/dev/null || echo "")
          PLAN_IN_STATE=$(terraform state show module.appservice.azurerm_app_service_plan.test 2>/dev/null && echo "yes" || echo "")
          if [ -n "$PLAN_EXISTS" ] && [ -z "$PLAN_IN_STATE" ]; then
            echo "Importing App Service Plan: $PLAN_NAME"
            terraform import module.appservice.azurerm_app_service_plan.test \
              "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Web/serverFarms/$PLAN_NAME"
          elif [ -n "$PLAN_IN_STATE" ]; then
            echo "App Service Plan already in Terraform state - skipping import"
          else
            echo "App Service Plan not found in Azure - will be created by Terraform"
          fi

          # Import App Service only if it exists in Azure AND is not already in state
          APP_EXISTS=$(az webapp show --name "$APP_NAME" --resource-group "$RG" --query "name" -o tsv 2>/dev/null || echo "")
          APP_IN_STATE=$(terraform state show module.appservice.azurerm_app_service.test 2>/dev/null && echo "yes" || echo "")
          if [ -n "$APP_EXISTS" ] && [ -z "$APP_IN_STATE" ]; then
            echo "Importing App Service: $APP_NAME"
            terraform import module.appservice.azurerm_app_service.test \
              "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Web/sites/$APP_NAME"
          elif [ -n "$APP_IN_STATE" ]; then
            echo "App Service already in Terraform state - skipping import"
          else
            echo "App Service not found in Azure - will be created by Terraform"
          fi
      env:
        ARM_CLIENT_ID: $(armClientId)
        ARM_CLIENT_SECRET: $(armClientSecret)
        ARM_TENANT_ID: $(armTenantId)
        ARM_SUBSCRIPTION_ID: $(subscriptionId)

    # Terraform Apply
    - task: TerraformTaskV2@2
      displayName: 'Terraform Apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        environmentServiceNameAzureRM: $(azureServiceConnection)
        commandOptions: '-auto-approve'
    
    # Capture Terraform Outputs
    - task: Bash@3
      displayName: 'Capture Terraform Outputs'
      inputs:
        targetType: 'inline'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        script: |
          echo "Extracting Terraform outputs..."
          APP_SERVICE_NAME=$(terraform output -raw app_service_name)
          PUBLIC_IP=$(terraform output -raw public_ip_address)
          LOG_ANALYTICS_WORKSPACE_ID=$(terraform output -raw log_analytics_workspace_id)
          LOG_ANALYTICS_SHARED_KEY=$(terraform output -raw log_analytics_shared_key)
          
          echo "##vso[task.setvariable variable=appServiceName;isOutput=true]$APP_SERVICE_NAME"
          echo "##vso[task.setvariable variable=publicIP;isOutput=true]$PUBLIC_IP"
          echo "##vso[task.setvariable variable=logAnalyticsWorkspaceId;isOutput=true]$LOG_ANALYTICS_WORKSPACE_ID"
          echo "##vso[task.setvariable variable=logAnalyticsSharedKey;isOutput=true;isSecret=true]$LOG_ANALYTICS_SHARED_KEY"
          
          echo "App Service Name: $APP_SERVICE_NAME"
          echo "Public IP: $PUBLIC_IP"
          echo "Log Analytics Workspace ID: $LOG_ANALYTICS_WORKSPACE_ID"
      name: terraformOutputs

#--------------------------------------------#
# BUILD
#--------------------------------------------#
- stage: Build
  displayName: 'Build'
  dependsOn: []
  jobs:
  - job: BuildArtifacts
    displayName: 'Build Artifacts'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Restore NuGet packages so all DLLs are present in bin/ before zipping
    # (Several DLLs from NuGet packages may not be committed to git)
    - task: Bash@3
      displayName: 'Restore NuGet DLLs to bin'
      inputs:
        targetType: 'inline'
        workingDirectory: '$(System.DefaultWorkingDirectory)/automatedtesting/jmeter/fakerestapi'
        script: |
          echo "Installing NuGet CLI..."
          sudo apt-get install -y nuget 2>/dev/null || true
          echo "Restoring packages from packages.config..."
          nuget install packages.config -OutputDirectory ./packages -NonInteractive 2>&1 | tail -15 || true
          echo "Copying net4x DLLs to bin/ (skipping already-present files)..."
          find ./packages -type f -name "*.dll" | grep -E '/lib/net4' | while read f; do
            cp -n "$f" ./bin/ 2>/dev/null || true
          done
          echo "DLL count in bin/: $(ls bin/*.dll 2>/dev/null | wc -l)"

    # Archive FakeRestAPI
    - task: ArchiveFiles@2
      displayName: 'Archive FakeRestAPI'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/automatedtesting/jmeter/fakerestapi'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/fakerestapi-$(Build.BuildId).zip'
    
    # Publish FakeRestAPI artifact
    - publish: $(Build.ArtifactStagingDirectory)/fakerestapi-$(Build.BuildId).zip
      displayName: 'Publish FakeRestAPI Artifact'
      artifact: drop-fakerestapi
    
    # Publish Selenium Tests
    - publish: $(System.DefaultWorkingDirectory)/automatedtesting/selenium
      displayName: 'Publish Selenium Tests'
      artifact: selenium
    
    # Publish Postman Tests
    - publish: $(System.DefaultWorkingDirectory)/automatedtesting/postman
      displayName: 'Publish Postman Tests'
      artifact: postman
    
    # Publish JMeter Tests
    - publish: $(System.DefaultWorkingDirectory)/automatedtesting/jmeter
      displayName: 'Publish JMeter Tests'
      artifact: jmeter

#--------------------------------------------#
# DEPLOY
#--------------------------------------------#
- stage: Deploy
  displayName: 'Deploy'
  dependsOn:
  - Build
  - ProvisionInfrastructure
  jobs:
  - deployment: DeployFakeRestAPI
    displayName: 'Deploy FakeRestAPI to App Service'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'TEST'
    variables:
      appServiceName: $[ stageDependencies.ProvisionInfrastructure.ProvisionTerraform.outputs['terraformOutputs.appServiceName'] ]
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy FakeRestAPI to Azure App Service'
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: 'webApp'
              appName: $(appServiceName)
              package: '$(Pipeline.Workspace)/drop-fakerestapi/fakerestapi-$(Build.BuildId).zip'
              deploymentMethod: 'zipDeploy'

          # Wait for App Service to warm up after deployment (avoids 503 on first request)
          - task: Bash@3
            displayName: 'Wait for App Service to warm up'
            inputs:
              targetType: 'inline'
              script: |
                APP_URL="https://$(appServiceName).azurewebsites.net/api/Activities"
                echo "Waiting for App Service to become available: $APP_URL"
                for i in $(seq 1 20); do
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
                  echo "Attempt $i: HTTP $STATUS"
                  if [ "$STATUS" = "200" ]; then
                    echo "App Service is ready!"
                    exit 0
                  fi
                  sleep 15
                done
                echo "WARNING: App Service did not return 200 after 5 minutes - continuing anyway"
                exit 0

#--------------------------------------------#
# TEST - INTEGRATION (Postman)
#--------------------------------------------#
- stage: IntegrationTest
  displayName: 'Integration Tests'
  dependsOn:
  - Deploy
  - ProvisionInfrastructure
  jobs:
  - job: PostmanTests
    displayName: 'Run Postman Integration Tests'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      appServiceName: $[ stageDependencies.ProvisionInfrastructure.ProvisionTerraform.outputs['terraformOutputs.appServiceName'] ]
    steps:
    # Download Postman artifact
    - download: current
      artifact: postman
    
    # Install Node.js for Newman
    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.x'
    
    # Install Newman (Postman CLI)
    - task: Bash@3
      displayName: 'Install Newman'
      inputs:
        targetType: 'inline'
        script: |
          npm install -g newman
    
    # Run Postman Tests
    - task: Bash@3
      displayName: 'Run Postman Tests'
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Pipeline.Workspace)/postman'
        script: |
          echo "Running Postman tests against: https://$(appServiceName).azurewebsites.net"
          
          # Run Newman - override baseUrl directly via --env-var (no sed needed)
          newman run StarterAPIs.json \
            -e TestEnvironment.json \
            --env-var "baseUrl=https://$(appServiceName).azurewebsites.net" \
            --delay-request 500 \
            --timeout-request 10000 \
            --reporters cli,junit \
            --reporter-junit-export $(System.DefaultWorkingDirectory)/postman-results.xml
    
    # Publish Postman Test Results
    - task: PublishTestResults@2
      displayName: 'Publish Postman Test Results'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(System.DefaultWorkingDirectory)/postman-results.xml'
        testRunTitle: 'Postman Integration Tests'
        failTaskOnFailedTests: false

#--------------------------------------------#
# TEST - PERFORMANCE (JMeter)
#--------------------------------------------#
- stage: PerformanceTest
  displayName: 'Performance Tests'
  dependsOn:
  - Deploy
  - ProvisionInfrastructure
  jobs:
  - job: JMeterStressTest
    displayName: 'JMeter Stress Test'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      appServiceName: $[ stageDependencies.ProvisionInfrastructure.ProvisionTerraform.outputs['terraformOutputs.appServiceName'] ]
    steps:
    # Download JMeter artifact
    - download: current
      artifact: jmeter
    
    # Install JMeter and Run Stress Test
    - task: Bash@3
      displayName: 'Install JMeter and Run Stress Test'
      inputs:
        targetType: 'inline'
        script: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          JMETER_HOME=$(pwd)/apache-jmeter-5.6.3

          # Remove stale JTL and report dir so dashboard generator always gets a clean, single-schema file
          rm -f $(System.DefaultWorkingDirectory)/stress-test-results.jtl
          rm -rf $(System.DefaultWorkingDirectory)/stress-test-report
          mkdir -p $(System.DefaultWorkingDirectory)/stress-test-report

          echo "Running Stress Test against: https://$(appServiceName).azurewebsites.net"
          # BASE_URL must be hostname only (no https://) - JMX sets domain=BASE_URL + protocol=PROTOCOL separately
          # Step 1: run JMeter - suppress responseMessage/responseData to prevent embedded commas corrupting CSV
          $JMETER_HOME/bin/jmeter -n \
            -t $(Pipeline.Workspace)/jmeter/StressTest.jmx \
            -JBASE_URL=$(appServiceName).azurewebsites.net \
            -JPROTOCOL=https \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.print_field_names=true \
            -Jjmeter.save.saveservice.timestamp_format=ms \
            -Jjmeter.save.saveservice.responseData=false \
            -Jjmeter.save.saveservice.requestHeaders=false \
            -Jjmeter.save.saveservice.responseHeaders=false \
            -l $(System.DefaultWorkingDirectory)/stress-test-raw.jtl \
            -j $(System.DefaultWorkingDirectory)/stress-test.log

          # Step 2: use Python csv module (handles quoted fields correctly) to normalise the JTL
          export RAW_JTL="$(System.DefaultWorkingDirectory)/stress-test-raw.jtl"
          export CLEAN_JTL="$(System.DefaultWorkingDirectory)/stress-test-results.jtl"
          python3 -c "
          import csv, sys, os
          raw = os.environ['RAW_JTL']
          clean = os.environ['CLEAN_JTL']
          try:
              fin = open(raw, newline='', encoding='utf-8', errors='replace')
              rows = list(csv.reader(fin)); fin.close()
              if not rows: print('WARNING: raw JTL empty'); sys.exit(0)
              header, ncols = rows[0], len(rows[0])
              print('Header columns: ' + str(ncols))
              good = [r for r in rows[1:] if len(r) == ncols]
              print('Kept ' + str(len(good)) + ' rows, dropped ' + str(len(rows)-1-len(good)) + ' malformed rows')
              fout = open(clean, 'w', newline='', encoding='utf-8')
              w = csv.writer(fout); w.writerow(header); w.writerows(good); fout.close()
          except Exception as e:
              print('ERROR normalising JTL: ' + str(e)); sys.exit(1)
          "

          # Step 3: generate dashboard from cleaned JTL
          $JMETER_HOME/bin/jmeter -g $(System.DefaultWorkingDirectory)/stress-test-results.jtl -o $(System.DefaultWorkingDirectory)/stress-test-report || true

          echo "--- Stress test JTL head ---"
          head -n 10 $(System.DefaultWorkingDirectory)/stress-test-results.jtl || true
          echo "--- Stress test JTL column count (first data line) ---"
          awk -F',' 'NR>1{print NF; exit}' $(System.DefaultWorkingDirectory)/stress-test-results.jtl || true
          echo "--- Stress test jmeter.log tail ---"
          tail -n 50 $(System.DefaultWorkingDirectory)/stress-test.log || true
    
    # Publish Stress Test Results
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Stress Test Report'
      condition: succeededOrFailed()
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)/stress-test-report'
        ArtifactName: 'stress-test-report'
    
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Stress Test Logs'
      condition: succeededOrFailed()
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)/stress-test.log'
        ArtifactName: 'stress-test-logs'
  
  - job: JMeterEnduranceTest
    displayName: 'JMeter Endurance Test'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      appServiceName: $[ stageDependencies.ProvisionInfrastructure.ProvisionTerraform.outputs['terraformOutputs.appServiceName'] ]
    steps:
    # Download JMeter artifact
    - download: current
      artifact: jmeter
    
    # Install JMeter and Run Endurance Test
    - task: Bash@3
      displayName: 'Install JMeter and Run Endurance Test'
      inputs:
        targetType: 'inline'
        script: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          JMETER_HOME=$(pwd)/apache-jmeter-5.6.3

          # Remove stale JTL and report dir so dashboard generator always gets a clean, single-schema file
          rm -f $(System.DefaultWorkingDirectory)/endurance-test-results.jtl
          rm -rf $(System.DefaultWorkingDirectory)/endurance-test-report
          mkdir -p $(System.DefaultWorkingDirectory)/endurance-test-report

          echo "Running Endurance Test against: https://$(appServiceName).azurewebsites.net"
          # BASE_URL must be hostname only (no https://) - JMX sets domain=BASE_URL + protocol=PROTOCOL separately
          # Step 1: run JMeter - suppress responseMessage/responseData to prevent embedded commas corrupting CSV
          $JMETER_HOME/bin/jmeter -n \
            -t $(Pipeline.Workspace)/jmeter/EnduranceTest.jmx \
            -JBASE_URL=$(appServiceName).azurewebsites.net \
            -JPROTOCOL=https \
            -JDURATION=300 \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.print_field_names=true \
            -Jjmeter.save.saveservice.timestamp_format=ms \
            -Jjmeter.save.saveservice.responseData=false \
            -Jjmeter.save.saveservice.requestHeaders=false \
            -Jjmeter.save.saveservice.responseHeaders=false \
            -l $(System.DefaultWorkingDirectory)/endurance-test-raw.jtl \
            -j $(System.DefaultWorkingDirectory)/endurance-test.log

          # Step 2: use Python csv module (handles quoted fields correctly) to normalise the JTL
          export RAW_JTL="$(System.DefaultWorkingDirectory)/endurance-test-raw.jtl"
          export CLEAN_JTL="$(System.DefaultWorkingDirectory)/endurance-test-results.jtl"
          python3 -c "
          import csv, sys, os
          raw = os.environ['RAW_JTL']
          clean = os.environ['CLEAN_JTL']
          try:
              fin = open(raw, newline='', encoding='utf-8', errors='replace')
              rows = list(csv.reader(fin)); fin.close()
              if not rows: print('WARNING: raw JTL empty'); sys.exit(0)
              header, ncols = rows[0], len(rows[0])
              print('Header columns: ' + str(ncols))
              good = [r for r in rows[1:] if len(r) == ncols]
              print('Kept ' + str(len(good)) + ' rows, dropped ' + str(len(rows)-1-len(good)) + ' malformed rows')
              fout = open(clean, 'w', newline='', encoding='utf-8')
              w = csv.writer(fout); w.writerow(header); w.writerows(good); fout.close()
          except Exception as e:
              print('ERROR normalising JTL: ' + str(e)); sys.exit(1)
          "

          # Step 3: generate dashboard from cleaned JTL
          $JMETER_HOME/bin/jmeter -g $(System.DefaultWorkingDirectory)/endurance-test-results.jtl -o $(System.DefaultWorkingDirectory)/endurance-test-report || true

          echo "--- Endurance test JTL head ---"
          head -n 10 $(System.DefaultWorkingDirectory)/endurance-test-results.jtl || true
          echo "--- Endurance test JTL column count (first data line) ---"
          awk -F',' 'NR>1{print NF; exit}' $(System.DefaultWorkingDirectory)/endurance-test-results.jtl || true
          echo "--- Endurance test jmeter.log tail ---"
          tail -n 50 $(System.DefaultWorkingDirectory)/endurance-test.log || true
    
    # Publish Endurance Test Results
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Endurance Test Report'
      condition: succeededOrFailed()
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)/endurance-test-report'
        ArtifactName: 'endurance-test-report'
    
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Endurance Test Logs'
      condition: succeededOrFailed()
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)/endurance-test.log'
        ArtifactName: 'endurance-test-logs'

#--------------------------------------------#
# TEST - FUNCTIONAL UI (Selenium)
#--------------------------------------------#
- stage: UITest
  displayName: 'Functional UI Tests'
  dependsOn:
  - Deploy
  - ProvisionInfrastructure
  jobs:
  - job: SeleniumTests
    displayName: 'Run Selenium UI Tests'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      appServiceName: $[ stageDependencies.ProvisionInfrastructure.ProvisionTerraform.outputs['terraformOutputs.appServiceName'] ]
      logAnalyticsWorkspaceId: $[ stageDependencies.ProvisionInfrastructure.ProvisionTerraform.outputs['terraformOutputs.logAnalyticsWorkspaceId'] ]
      logAnalyticsSharedKey: $[ stageDependencies.ProvisionInfrastructure.ProvisionTerraform.outputs['terraformOutputs.logAnalyticsSharedKey'] ]
    steps:
    # Download Selenium artifact
    - download: current
      artifact: selenium
    
    # Install Python
    - task: UsePythonVersion@0
      displayName: 'Use Python $(python.version)'
      inputs:
        versionSpec: '$(python.version)'
    
    # Install Chrome and ChromeDriver
    - task: Bash@3
      displayName: 'Install Chrome and ChromeDriver'
      inputs:
        targetType: 'inline'
        script: |
          # Chrome is pre-installed on ubuntu-latest agents
          # Just verify the version and let selenium-manager handle ChromeDriver
          google-chrome --version || (sudo apt-get update -q && sudo apt-get install -y google-chrome-stable)
          echo "Chrome version: $(google-chrome --version)"
    
    # Install Selenium and dependencies
    - task: Bash@3
      displayName: 'Install Selenium and Dependencies'
      inputs:
        targetType: 'inline'
        script: |
          pip install "selenium>=4.6.0"
          pip install requests
    
    # Run Selenium Tests
    - task: Bash@3
      displayName: 'Run Selenium UI Tests'
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Pipeline.Workspace)/selenium'
        script: |
          echo "Running Selenium tests..."
          export HEADLESS=1
          python3 login.py
    
    # Upload Logs to Azure Log Analytics
    - task: Bash@3
      displayName: 'Upload Logs to Azure Log Analytics'
      condition: always()
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Pipeline.Workspace)/selenium'
        script: |
          echo "Uploading Selenium logs to Azure Log Analytics..."
          export LOG_ANALYTICS_WORKSPACE_ID=$(logAnalyticsWorkspaceId)
          export LOG_ANALYTICS_SHARED_KEY=$(logAnalyticsSharedKey)
          python3 upload_logs_to_azure.py
    
    # Publish Selenium Logs as Artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Selenium Logs'
      condition: always()
      inputs:
        PathtoPublish: '$(Pipeline.Workspace)/selenium/log'
        ArtifactName: 'selenium-logs'

#--------------------------------------------#
# DESTROY INFRASTRUCTURE (Optional - Manual Trigger)
#--------------------------------------------#
- stage: DestroyInfrastructure
  displayName: 'Destroy Infrastructure'
  dependsOn:
  - IntegrationTest
  - PerformanceTest
  - UITest
  condition: eq(variables['destroyInfrastructure'], 'true')
  jobs:
  - job: TerraformDestroy
    displayName: 'Terraform Destroy'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: TerraformInstaller@0
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: $(terraformVersion)
    
    - task: TerraformTaskV2@2
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        backendServiceArm: $(azureServiceConnection)
        backendAzureRmResourceGroupName: '$(resourceGroup)'
        backendAzureRmStorageAccountName: '$(tfStateStorageAccount)'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'
    
    - task: TerraformTaskV2@2
      displayName: 'Terraform Destroy'
      inputs:
        provider: 'azurerm'
        command: 'destroy'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        environmentServiceNameAzureRM: $(azureServiceConnection)
        commandOptions: '-auto-approve'


